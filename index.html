<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master PWA Studio</title>
    <style>
        html, body { 
            background: #000; color: #0f0; font-family: monospace;
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .header { height: 60px; border-bottom: 1px solid #0f0; display: flex; align-items: center; padding: 0 10px; z-index: 10; background: #000; }
        .footer { height: 70px; border-top: 1px solid #0f0; display: flex; align-items: center; padding: 0 10px; background: #000; }
        .editor-space { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        textarea { 
            flex: 1; background: #050505; color: #0f0; border: none; 
            padding: 15px; font-size: 16px; outline: none; resize: none;
            line-height: 22px; width: 100%; box-sizing: border-box;
        }

        #status-box { 
            margin-left: auto; width: 50px; height: 40px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s;
        }

        #error-container {
            display: none; background: #111; border-bottom: 2px solid #f00; 
            max-height: 40vh; overflow-y: auto; width: 100%; z-index: 9;
        }

        .error-item {
            padding: 12px; border-bottom: 1px solid #333; color: #f88;
            font-size: 14px; cursor: pointer;
        }
        .error-item:active { background: #333; }

        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 3px; }
        
        /* Auto-save notification */
        #save-indicator { font-size: 10px; color: #555; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <span id="project-title">STUDIO: PHASE 1</span>
        <span id="save-indicator">IDLE</span>
        <div id="status-box" onclick="toggleErrorList()" style="background: #0f0; color: #000;">
            <span id="status-icon">✓</span>
        </div>
    </div>

    <div id="error-container">
        <div id="error-list"></div>
    </div>

    <div class="editor-space">
        <textarea id="main-editor" spellcheck="false" placeholder="Begin coding..."></textarea>
    </div>

    <div class="footer">
        <input type="file" id="file-input" style="display:none">
        <button id="load-library" onclick="document.getElementById('file-input').click()">LOAD</button>
        <button id="clear-btn" onclick="if(confirm('Wipe editor?')) mainEditor.value=''" style="margin-left:10px; background:#444; color:#fff;">CLEAR</button>
    </div>

    <script>
        const mainEditor = document.getElementById('main-editor');
        const statusBox = document.getElementById('status-box');
        const statusIcon = document.getElementById('status-icon');
        const errorContainer = document.getElementById('error-container');
        const errorList = document.getElementById('error-list');
        const saveIndicator = document.getElementById('save-indicator');

        // 1. GHOST BUFFER (Local Storage Auto-Save)
        window.onload = () => {
            const savedCode = localStorage.getItem('studio_buffer');
            if (savedCode) mainEditor.value = savedCode;
            runSieve();
        };

        const autoSave = () => {
            localStorage.setItem('studio_buffer', mainEditor.value);
            saveIndicator.innerText = "SAVED";
            setTimeout(() => { saveIndicator.innerText = "READY"; }, 1000);
        };

        // 2. THE SIEVE (Logic Engine)
        function runSieve() {
            const code = mainEditor.value;
            const errors = [];

            // Brackets
            const brackets = [
                { o: '{', c: '}', n: 'Brace' },
                { o: '(', c: ')', n: 'Paren' },
                { o: '[', c: ']', n: 'Bracket' }
            ];
            brackets.forEach(b => {
                const oCount = (code.match(new RegExp('\\' + b.o, 'g')) || []).length;
                const cCount = (code.match(new RegExp('\\' + b.c, 'g')) || []).length;
                if (oCount !== cCount) {
                    errors.push({ msg: `${b.n} Mismatch: ${oCount} vs ${cCount}`, line: findLastOccurrence(code, b.o) });
                }
            });

            // HTML Tags
            const tags = ['div', 'span', 'button', 'script', 'style'];
            tags.forEach(t => {
                const oT = (code.match(new RegExp('<' + t, 'g')) || []).length;
                const cT = (code.match(new RegExp('</' + t, 'g')) || []).length;
                if (oT !== cT) {
                    errors.push({ msg: `Tag <${t}> not closed`, line: findLastOccurrence(code, '<' + t) });
                }
            });

            // Spelling (Keywords)
            const keywords = ['function', 'const', 'let', 'return'];
            keywords.forEach(word => {
                // Find potential typos (e.g., "functon") using simple regex
                const typos = code.match(new RegExp('\\b' + word.substring(0,3) + '[a-z]+\\b', 'g')) || [];
                typos.forEach(t => {
                    if (t !== word && word.startsWith(t.substring(0,3))) {
                        errors.push({ msg: `Check spelling: ${t}?`, line: findLastOccurrence(code, t) });
                    }
                });
            });

            updateUI(errors);
        }

        function findLastOccurrence(code, str) {
            const index = code.lastIndexOf(str);
            return code.substring(0, index).split('\n').length;
        }

        function updateUI(errors) {
            if (errors.length > 0) {
                statusBox.style.background = '#f00';
                statusIcon.innerText = errors.length;
                errorList.innerHTML = errors.map(e => `
                    <div class="error-item" onclick="jumpTo(${e.line})">
                        Line ${e.line}: ${e.msg}
                    </div>
                `).join('');
            } else {
                statusBox.style.background = '#0f0';
                statusIcon.innerText = '✓';
                errorList.innerHTML = '<div style="color:#0f0; padding:10px;">Structure Clean.</div>';
            }
        }

        function toggleErrorList() {
            errorContainer.style.display = errorContainer.style.display === 'block' ? 'none' : 'block';
        }

        // 3. THE JUMP (Auto-Scroll Logic)
        function jumpTo(line) {
            const lines = mainEditor.value.split('\n');
            let charPos = 0;
            for (let i = 0; i < line - 1; i++) {
                charPos += lines[i].length + 1;
            }
            mainEditor.focus();
            mainEditor.setSelectionRange(charPos, charPos + lines[line-1].length);
            
            // Scroll calculation for Moto G35
            const lineHeight = 22; 
            mainEditor.scrollTop = (line - 3) * lineHeight;
            errorContainer.style.display = 'none';
        }

        // 4. LOAD LOGIC
        document.getElementById('file-input').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                mainEditor.value = ev.target.result;
                runSieve();
            };
            reader.readAsText(e.target.files[0]);
        });

        mainEditor.addEventListener('input', () => {
            runSieve();
            autoSave();
        });
    </script>
</body>
</html>
