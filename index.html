<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master PWA Studio</title>
    <style>
        html, body { 
            background: #000; color: #0f0; font-family: monospace;
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .header { height: 60px; border-bottom: 1px solid #0f0; display: flex; align-items: center; padding: 0 10px; }
        .footer { height: 70px; border-top: 1px solid #0f0; display: flex; align-items: center; padding: 0 10px; }
        .editor-space { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #050505; color: #0f0; border: none; padding: 15px; font-size: 14px; outline: none; resize: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <span id="project-title">NEW PROJECT</span>
    </div>

    <div class="editor-space">
        <textarea id="main-editor" placeholder="Ready for library injection..."></textarea>
    </div>

    <div class="footer">
        <!-- The Hidden Input that Android needs to see the files -->
        <input type="file" id="file-input" style="display:none">
        <button id="load-library" onclick="document.getElementById('file-input').click()">LOAD LIBRARY</button>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const mainEditor = document.getElementById('main-editor');

        // This listener triggers when you select your MasterLibrary.json
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const libraryData = JSON.parse(event.target.result);
                    
                    // Fills the textarea with your library item titles
                    mainEditor.value = "--- SUCCESS: LIBRARY LOADED ---\n" + 
                                       libraryData.editor_blueprints.map(i => i.title).join('\n');
                } catch (err) {
                    alert("JSON Error: Check your MasterLibrary.json file formatting.");
                }
            };
            reader.readAsText(file);
        });

        console.log("System Operational.");
    </script>
</body>
</html>
