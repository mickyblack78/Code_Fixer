<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL STUDIO</title>
    <style>
        :root { --neon: #0f0; --error: #f00; --bg: #000; --panel: #111; --text: #0f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            background: var(--bg); color: var(--text); font-family: 'Courier New', monospace;
            margin: 0; padding: 0; height: 100%; overflow: hidden; display: flex; flex-direction: column;
        }

        /* HEADER SECTION */
        .header { 
            height: 60px; border-bottom: 2px solid var(--neon); 
            display: flex; align-items: center; padding: 0 15px; background: var(--bg); z-index: 100;
        }
        #neural-status { 
            margin-left: auto; padding: 5px 15px; border: 1px solid var(--neon); 
            border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer;
        }

        /* MAIN WORKSPACE */
        .workspace { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        textarea { 
            flex: 1; background: #050505; color: var(--text); border: none; 
            padding: 20px; font-size: 16px; outline: none; resize: none;
            line-height: 24px; width: 100%; white-space: pre; overflow-wrap: normal; overflow-x: auto;
        }

        /* ACTION CENTER (Slide-up Drawer) */
        #action-center {
            position: absolute; bottom: 0; width: 100%; background: var(--panel);
            border-top: 2px solid var(--neon); transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 50%; display: flex; flex-direction: column; z-index: 50;
        }
        #action-center.active { transform: translateY(0); }
        .drawer-handle { height: 30px; display: flex; align-items: center; justify-content: center; background: #222; cursor: pointer; }
        .drawer-handle::after { content: ''; width: 40px; height: 4px; background: var(--neon); border-radius: 2px; }
        #fix-list { flex: 1; overflow-y: auto; padding: 10px; }

        /* LIVE PREVIEW DRAWER */
        #preview-drawer {
            position: absolute; top: 0; right: 0; width: 80%; height: 100%;
            background: #fff; border-left: 2px solid var(--neon);
            transform: translateX(100%); transition: 0.3s; z-index: 60;
        }
        #preview-drawer.active { transform: translateX(0); }

        /* FIX ITEM UI */
        .fix-item {
            background: #1a1a1a; border-left: 4px solid var(--error);
            margin-bottom: 10px; padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }
        .fix-btn { 
            background: var(--neon); color: #000; border: none; padding: 8px; 
            font-weight: bold; border-radius: 4px; font-size: 12px;
        }

        /* FOOTER CONTROLS */
        .footer { 
            height: 75px; border-top: 1px solid var(--neon); 
            display: flex; align-items: center; padding: 0 10px; gap: 8px; background: var(--bg);
        }
        .btn-main { 
            background: var(--neon); color: #000; border: none; flex: 1; 
            height: 45px; font-weight: bold; border-radius: 4px; font-size: 11px;
        }
        .btn-sec { background: #333; color: var(--neon); border: 1px solid var(--neon); flex: 0.7; height: 45px; font-size: 11px; font-weight: bold;}
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; flex-direction:column;">
            <span style="font-weight:bold; letter-spacing:2px;">NEURAL STUDIO</span>
            <span id="save-indicator" style="font-size:10px; opacity:0.5;">main_module.js</span>
        </div>
        <div id="neural-status" onclick="toggleDrawer('action-center')">SYSTEM READY</div>
    </div>

    <div class="workspace">
        <textarea id="main-editor" spellcheck="false" placeholder="// Neural Link Established..."></textarea>
        
        <!-- Action Center Drawer -->
        <div id="action-center">
            <div class="drawer-handle" onclick="toggleDrawer('action-center')"></div>
            <div id="fix-list">
                <!-- Logic will inject fix items here -->
            </div>
        </div>

        <!-- Live View Drawer -->
        <div id="preview-drawer">
            <div style="background:#222; color:#fff; padding:10px; display:flex;">
                <span style="font-size:12px;">LIVE_PREVIEW</span>
                <button onclick="toggleDrawer('preview-drawer')" style="margin-left:auto; background:red; color:white; border:none; border-radius:3px;">CLOSE</button>
            </div>
            <iframe id="preview-frame" style="width:100%; height:calc(100% - 40px); border:none;"></iframe>
        </div>
    </div>

    <div class="footer">
        <button class="btn-sec" id="undo-btn">UNDO</button>
        <button class="btn-sec" id="redo-btn">REDO</button>
        <button class="btn-main" id="run-btn">RUN CODE</button>
        <button class="btn-main" id="fix-all-btn" style="background:var(--error); color:#fff;">FIX ALL</button>
    </div>

    <script>
    const mainEditor = document.getElementById('main-editor');
    const neuralStatus = document.getElementById('neural-status');
    const fixList = document.getElementById('fix-list');
    const previewFrame = document.getElementById('preview-frame');

    let historyStack = [];
    let redoStack = [];
    let dismissedUIDs = new Set();

    // 1. NEURAL DICTIONARY (Intelligence Core)
    const neuralLibrary = {
        critical: [
            { id: 'MISMATCH_BRACE', p: /\{/g, c: /\}/g, n: 'Brace', msg: 'Missing closing }', type: 'structure' },
            { id: 'MISMATCH_PAREN', p: /\(/g, c: /\)/g, n: 'Paren', msg: 'Missing closing )', type: 'structure' },
            { id: 'TAG_DIV', p: /<div/g, c: /<\/div>/g, n: 'div', msg: 'Unclosed <div> tag', type: 'tag' }
        ],
        typos: [
            { find: /\bfuncton\b/g, fix: 'function', msg: 'Spelling: function' },
            { find: /\bcont\b/g, fix: 'const', msg: 'Spelling: const' },
            { find: /\blett\b/g, fix: 'let', msg: 'Spelling: let' },
            { find: /\breturnn\b/g, fix: 'return', msg: 'Spelling: return' }
        ]
    };

   // NEW HIGH-SENSITIVITY SCANNER
    function scanAndDiagnose() {
        const code = mainEditor.value;
        const diagnostics = [];

        // 1. Structural Scan (Brackets/Parens) - Now detects even if touching text
        const structures = [
            { o: /\{/g, c: /\}/g, n: 'Brace' },
            { o: /\(/g, c: /\)/g, n: 'Paren' },
            { o: /\[/g, c: /\]/g, n: 'Bracket' }
        ];
        structures.forEach(s => {
            const oCount = (code.match(s.o) || []).length;
            const cCount = (code.match(s.c) || []).length;
            if (oCount !== cCount) {
                diagnostics.push({ 
                    uid: `struct-${s.n}`, 
                    severity: 'high', 
                    msg: `${s.n} Mismatch: ${oCount} open vs ${cCount} closed`, 
                    pos: code.lastIndexOf(oCount > cCount ? '{' : '}'), 
                    suggestion: oCount > cCount ? (s.n==='Brace' ? '}' : s.n==='Paren' ? ')' : ']') : '',
                    action: 'INJECT' 
                });
            }
        });

        // 2. HTML Integrity Scan (Catches your "HTM" or missing "<" errors)
        const coreTags = ['html', 'head', 'body', 'script', 'style', 'div', 'span'];
        coreTags.forEach(tag => {
            const openTag = new RegExp('<' + tag, 'gi');
            const closeTag = new RegExp('</' + tag, 'gi');
            const oT = (code.match(openTag) || []).length;
            const cT = (code.match(closeTag) || []).length;
            if (oT !== cT) {
                diagnostics.push({ uid: `tag-${tag}`, severity: 'high', msg: `Critical Tag Failure: <${tag}> balance is off.`, pos: 0, suggestion: `</${tag}>`, action: 'INJECT' });
            }
        });

        // 3. Typo Search (Keywords)
        neuralLibrary.typos.forEach(rule => {
            let m; while ((m = rule.find.exec(code)) !== null) {
                const uid = `typo-${rule.fix}-${m.index}`;
                diagnostics.push({ uid, severity: 'medium', msg: `Syntax Error: ${m[0]}`, pos: m.index, len: m[0].length, suggestion: rule.fix, action: 'REPLACE' });
            }
        });

        renderDiagnostics(diagnostics);
    }

    function renderDiagnostics(findings) {
        fixList.innerHTML = '';
        // Separate visible faults from hidden ones
        const active = findings.filter(f => !dismissedUIDs.has(f.uid));
        const hiddenCount = dismissedUIDs.size;

        neuralStatus.style.color = active.length > 0 ? 'var(--error)' : 'var(--neon)';
        neuralStatus.innerText = active.length > 0 ? `${active.length} FAULTS` : `SYSTEM OPTIMAL`;

        // If there are hidden errors, show a "RECALL" header
        if (hiddenCount > 0) {
            const recallBtn = document.createElement('div');
            recallBtn.style = "padding:10px; color:#555; font-size:10px; text-align:center; cursor:pointer; text-decoration:underline;";
            recallBtn.innerText = `RESET ${hiddenCount} EXCEPTIONS`;
            recallBtn.onclick = () => { dismissedUIDs.clear(); scanAndDiagnose(); };
            fixList.appendChild(recallBtn);
        }

        active.forEach(issue => {
            const div = document.createElement('div');
            div.className = 'fix-item';
            div.innerHTML = `<b onclick="inspectError(${issue.pos})" style="cursor:pointer; text-decoration:underline;">${issue.msg}</b> ...`;
                <div style="font-size:10px; opacity:0.6;">${issue.uid.split('-')[0].toUpperCase()} ERROR</div>
                <b>${issue.msg}</b>
                <div style="display:flex; gap:10px; margin-top:8px;">
                    <button class="fix-btn" onclick="applySmartFix('${issue.uid}', ${issue.pos}, ${issue.len || 0}, '${issue.suggestion}', '${issue.action}')">APPLY FIX</button>
                    <button class="fix-btn" style="background:#333; color:#fff;" onclick="dismissFault('${issue.uid}')">EXCEPT</button>
                </div>
            `;
            fixList.appendChild(div);
        });
    } 

    // 4. PREVIEW & UI CONTROLS
    function toggleDrawer(id) {
        const el = document.getElementById(id);
        el.classList.toggle('active');
        if (id === 'action-center' && el.classList.contains('active')) scanAndDiagnose();
    }

    function dismissFault(uid) {
        dismissedUIDs.add(uid);
        scanAndDiagnose();
    }

    // Initialize
    mainEditor.addEventListener('input', () => {
        scanAndDiagnose();
        // Placeholder for History Save
    });

    window.onload = () => { scanAndDiagnose(); };
    // 5. THE SELF-HEALER (Surgical Correction)
    function applySmartFix(uid, pos, len, suggestion, action) {
        const code = mainEditor.value;
        saveState(); // Save to Undo stack before fixing

        let newCode;
        if (action === 'REPLACE') {
            // Replace the typo (e.g., 'functon' -> 'function')
            newCode = code.substring(0, pos) + suggestion + code.substring(pos + len);
        } else if (action === 'INJECT') {
            // Inject missing structure (e.g., adding '}' at the end of a block)
            // Smart Injection: Finds the next logical newline or end of file
            newCode = code.substring(0, pos + 1) + "\n" + suggestion + code.substring(pos + 1);
        }  else if (action === 'DELETE') {
    newCode = code.substring(0, pos) + code.substring(pos + 1);
        }

        mainEditor.value = newCode;
        dismissedUIDs.add(uid); // Remove from list once fixed
        scanAndDiagnose();
        
        // Visual Feedback: Snap cursor to the fix
        mainEditor.focus();
        mainEditor.setSelectionRange(pos, pos + suggestion.length);
    }

    // 6. THE RUNTIME SANDBOX (Live Execution)
    function runCode() {
        const code = mainEditor.value;
        const frame = document.getElementById('preview-frame');
        const drawer = document.getElementById('preview-drawer');
        
        // Open the preview pane
        drawer.classList.add('active');

        // Create a data blob for the iframe to keep it isolated
        const blob = new Blob([`
            <!DOCTYPE html>
            <html>
            <head><style>body{background:#fff;font-family:sans-serif;padding:20px;word-wrap:break-word;}</style></head>
            <body>
                <div id="app-root"></div>
                <script>
                    try {
                        ${code}
                    } catch (err) {
                        document.body.innerHTML = '<div style="color:red;font-weight:bold;border:2px solid red;padding:10px;">RUNTIME ERROR:<br>' + err.message + '</div>';
                    }
                <\/script>
            </body>
            </html>
        `], { type: 'text/html' });

        frame.src = URL.createObjectURL(blob);
    }

    // 7. FIX ALL (Batch Correction)
    function fixAllFaults() {
        // We run backwards through the diagnostics so indices don't shift
        const code = mainEditor.value;
        const findings = []; // Get fresh scan data
        
        // Simplified batch logic: We prioritize typos first
        neuralLibrary.typos.forEach(rule => {
            mainEditor.value = mainEditor.value.replace(rule.find, rule.fix);
        });
        
        scanAndDiagnose();
        alert('Neural Sieve: Automated Batch Fix Applied.');
    }

    // 8. EVENT WIRING
    document.getElementById('run-btn').onclick = runCode;
    document.getElementById('fix-all-btn').onclick = fixAllFaults;
    // 9. TIME TRAVEL (Undo/Redo Logic)
    function saveState() {
        // Limit history to 50 steps to save memory on Moto G35
        if (historyStack.length >= 50) historyStack.shift();
        historyStack.push(mainEditor.value);
        redoStack = []; // Clear redo on new input
        updateSaveIndicator('CHANGES PENDING');
    }

    function undoAction() {
        if (historyStack.length > 1) {
            redoStack.push(historyStack.pop());
            const previousState = historyStack[historyStack.length - 1];
            mainEditor.value = previousState;
            scanAndDiagnose();
            updateSaveIndicator('UNDO APPLIED');
        }
    }

    function redoAction() {
        if (redoStack.length > 0) {
            const nextState = redoStack.pop();
            mainEditor.value = nextState;
            historyStack.push(nextState);
            scanAndDiagnose();
            updateSaveIndicator('REDO APPLIED');
        }
    }

    // 10. GHOST BUFFER (Persistence)
    function updateSaveIndicator(text) {
        const indicator = document.getElementById('save-indicator');
        indicator.innerText = text;
        indicator.style.opacity = '1';
        
        // Auto-save to LocalStorage
        localStorage.setItem('neural_studio_buffer', mainEditor.value);
        
        setTimeout(() => { indicator.style.opacity = '0.4'; }, 2000);
    }

    // 11. PRECISION NAVIGATION
    function jumpTo(pos, len) {
        mainEditor.focus();
        mainEditor.setSelectionRange(pos, pos + len);
        
        // Calculate scroll offset to center the line
        const lines = mainEditor.value.substr(0, pos).split('\n');
        const lineNumber = lines.length;
        const lineHeight = 24; // Matching CSS
        mainEditor.scrollTop = (lineNumber * lineHeight) - (mainEditor.clientHeight / 2);
        
        // Close the action center to show the code
        document.getElementById('action-center').classList.remove('active');
    }

    // 12. UI INITIALIZATION & SYNC
    document.getElementById('undo-btn').onclick = undoAction;
    document.getElementById('redo-btn').onclick = redoAction;

    // Load from cache on startup
    const cached = localStorage.getItem('neural_studio_buffer');
    if (cached) {
        mainEditor.value = cached;
        saveState();
        scanAndDiagnose();
    }

    // Capture "Tab" key for actual coding feel
    mainEditor.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = mainEditor.selectionStart;
            const end = mainEditor.selectionEnd;
            mainEditor.value = mainEditor.value.substring(0, start) + "    " + mainEditor.value.substring(end);
            mainEditor.selectionStart = mainEditor.selectionEnd = start + 4;
            saveState();
        }
    });

    // Debounced Scanner to keep performance high
    let scanTimeout;
    mainEditor.addEventListener('input', () => {
        clearTimeout(scanTimeout);
        scanTimeout = setTimeout(() => {
            saveState();
            scanAndDiagnose();
        }, 500); // Wait 500ms after typing stops
        function inspectError(pos) {
    mainEditor.focus();
    mainEditor.setSelectionRange(pos, pos + 1);
    const lines = mainEditor.value.substr(0, pos).split('\n');
    mainEditor.scrollTop = (lines.length * 24) - (mainEditor.clientHeight / 2);
        }
        document.getElementById('save-indicator').onclick = () => { mainEditor.select(); };  
    });
</script>
</body>
</html>
